name: three-zero-four

services:
  postgres:
    image: postgres:18.4-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    volumes:
      - postgres-data:/var/lib/postgresql

  redis:
    image: redis:8-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    volumes:
      - redis-data:/data

  migrate:
    build:
      context: ../..
      dockerfile: apps/game-service/Dockerfile
    command: ["node", "dist/scripts/migrate.js"]
    environment:
      DATABASE_URL: ${DATABASE_URL}
    depends_on:
      postgres:
        condition: service_healthy
    restart: "no"

  game-service:
    build:
      context: ../..
      dockerfile: apps/game-service/Dockerfile
    environment:
      NODE_ENV: production
      PORT: 4100
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      CORS_ORIGINS: http://127.0.0.1:3000
      SESSION_COOKIE_NAME: g304_session
    ports:
      - "127.0.0.1:4100:4100"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4100/readyz').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    depends_on:
      postgres:
        condition: service_healthy
        restart: true
      redis:
        condition: service_healthy
        restart: true
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_GAME_SERVICE_URL: ${NEXT_PUBLIC_GAME_SERVICE_URL}
    environment:
      NEXT_PUBLIC_GAME_SERVICE_URL: ${NEXT_PUBLIC_GAME_SERVICE_URL}
    ports:
      - "127.0.0.1:3000:3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    depends_on:
      game-service:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres-data:
  redis-data:
