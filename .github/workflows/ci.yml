name: CI

on:
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0
      - name: Prepare Compose environment
        run: cp infra/compose/.env.example infra/compose/.env
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .node-version
      - run: corepack enable
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm audit --audit-level=high
      - run: pnpm audit signatures
      - name: Scan committed history for secrets
        uses: gitleaks/gitleaks-action@ff98106e4c7b2bc287b24eaf42907196329070c7 # v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Scan repository dependencies and configuration
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - run: docker compose --env-file infra/compose/.env -f infra/compose/compose.yaml up --build --wait
      - run: curl --fail --silent --show-error http://127.0.0.1:4100/livez
      - run: curl --fail --silent --show-error http://127.0.0.1:4100/readyz
      - name: Scan release game-service image
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: three-zero-four-game-service:latest
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - name: Scan release web image
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          image-ref: three-zero-four-web:latest
          format: table
          severity: HIGH,CRITICAL
          ignore-unfixed: true
          exit-code: "1"
      - run: pnpm --filter @three-zero-four/web exec playwright install --with-deps chromium
      - run: E2E_BASE_URL=http://127.0.0.1:3000 pnpm --filter @three-zero-four/web exec playwright test
      - run: G304_RESTORE_REHEARSAL=1 scripts/backup-restore-rehearsal.sh
      - run: LOAD_BASE_URL=http://127.0.0.1:4100 LOAD_ORIGIN=http://127.0.0.1:3000 node infra/load/browser-api-smoke.js
      - run: docker compose --env-file infra/compose/.env --project-name g304-integration -f infra/compose/compose.yaml up --build --wait postgres redis
      - run: docker compose --env-file infra/compose/.env --project-name g304-integration -f infra/compose/compose.yaml run --rm --no-deps migrate
      - run: docker compose --env-file infra/compose/.env --project-name g304-integration -f infra/compose/compose.yaml --profile integration build integration
      - run: docker compose --env-file infra/compose/.env --project-name g304-integration -f infra/compose/compose.yaml --profile integration run --rm --no-deps integration
      - if: failure()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: playwright-artifacts
          path: |
            apps/web/test-results
            apps/web/playwright-report
          if-no-files-found: ignore
      - if: failure()
        run: docker compose --env-file infra/compose/.env -f infra/compose/compose.yaml ps
      - if: failure()
        run: docker compose --env-file infra/compose/.env -f infra/compose/compose.yaml logs --no-color
      - if: failure()
        run: docker compose --env-file infra/compose/.env --project-name g304-integration -f infra/compose/compose.yaml ps
      - if: failure()
        run: docker compose --env-file infra/compose/.env --project-name g304-integration -f infra/compose/compose.yaml logs --no-color
      - if: always()
        run: docker compose --env-file infra/compose/.env --project-name g304-integration -f infra/compose/compose.yaml down --volumes --remove-orphans
      - if: always()
        run: docker compose --env-file infra/compose/.env -f infra/compose/compose.yaml down --volumes --remove-orphans
